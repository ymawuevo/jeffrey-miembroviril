<!DOCTYPE html>

<head>

    <title>Cargando...</title>

    <style>
        /* Esto hace que la foto ocupe toda la pantalla de forma limpia */
        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* Fondo negro por si la foto no ocupa todo */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <script>
        // Primero salta tu pregunta
        var respuesta = confirm("¿Te gustan los therians?");
        
        if (respuesta == true) {
            // SI LE DAN A ACEPTAR: Se cierra el cartelito y verán la foto del hámster puesta en la web
            // (No tocamos nada, se queda en esta página)
        } else {
            // SI LE DAN A CANCELAR: Los echa para atrás
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = "about:blank";
            }
        }
    </script>

    <img src="https://i.ibb.co/tM5wpGRc/imagen-convertida.jpg" alt="Hámster">

</body>
