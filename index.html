<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    
    <meta property="og:title" content="PON AQUÍ EL TÍTULO QUE QUIERAS" />
    <meta property="og:description" content="Pon aquí una descripción corta" />
    <meta property="og:image" content="https://i.ibb.co/tM5wpGRc/imagen-convertida.jpg" />
    <meta property="og:type" content="website" />
    
    <title>Cargando...</title>
</head>
<body>
    <p style="font-family: sans-serif; text-align: center; margin-top: 50px;">
        Procesando solicitud...
    </p>

    <script>
        // Esto bloquea la página al instante y lanza tu pregunta
        var respuesta = confirm("¿Te gustan los therians?");
        
        if (respuesta == true) {
            // SI LE DAN A ACEPTAR: Los mandas a la web que quieras
            window.location.href = "https://www.google.com";
        } else {
            // SI LE DAN A CANCELAR: Los echa para atrás
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = "about:blank";
            }
        }
    </script>
</body>
</html>
